name: txeneza_app
description: "Um novo projeto Flutter."
# A linha a seguir impede que o pacote seja publicado acidentalmente no pub.dev.
# Isso é preferível para pacotes privados.
publish_to: 'none'

# Define a versão e o número de compilação do seu aplicativo.
# O número da versão consiste em três números separados por pontos, como 1.2.43
# seguido por um número de compilação opcional separado por um +.
# Ambos os valores podem ser substituídos na compilação do flutter
# especificando --build-name e --build-number, respectivamente.
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

# Dependências especificam outros pacotes que seu projeto precisa para funcionar.
dependencies:
  flutter:
    sdk: flutter

  # Adiciona a fonte Cupertino Icons ao seu aplicativo.
  # Use com a classe CupertinoIcons para ícones no estilo iOS.
  cupertino_icons: ^1.0.8
  # lucide_icons (0.257.0) está abandonado e não compila em Flutter recente:
  # estende IconData, que passou a ser uma final class.
  lucide_icons_flutter: ^3.1.15
  rive: ^0.14.9
  preload_page_view: ^0.2.0
  google_fonts: ^8.1.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  connectivity_plus: ^7.1.1
  permission_handler: ^12.0.3
  shared_preferences: ^2.5.5
  flutter_svg: ^2.0.10+1
  flutter_dotenv: ^5.2.1
  http: ^1.6.0
  supabase_flutter: ^2.10.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # O pacote "flutter_lints" contém um conjunto de regras de análise recomendadas
  # para incentivar boas práticas de programação.
  flutter_lints: ^6.0.0

# Esta seção é específica para configurações do Flutter.
flutter:
  # Garante que a fonte Material Icons seja incluída no seu aplicativo,
  # permitindo que você use as classes de ícones padrão do Material Design.
  uses-material-design: true

  # Configuração de assets do aplicativo
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - .env
